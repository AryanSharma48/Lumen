name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
    - run: npm ci
    - run: npm run lint
    - run: npm test
    - name: Build
      run: npm run build
      env:
        # Stub values so Next.js build-time static analysis doesn't fail.
        # Real secrets are only needed at runtime, not during the build.
        SUPABASE_URL: https://placeholder.supabase.co
        SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role_key
        RESEND_API_KEY: re_placeholder
        GEMINI_API_KEY: AIza_placeholder
        NEXT_PUBLIC_APP_URL: http://localhost:3000
